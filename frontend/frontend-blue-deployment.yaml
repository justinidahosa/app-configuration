apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-blue
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      version: blue
  template:
    metadata:
      labels:
        app: frontend
        version: blue
    spec:
      containers:
      - name: frontend
        image: 864899875710.dkr.ecr.us-east-1.amazonaws.com/frontend-blue:1.0.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
