apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-green
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      version: green
  template:
    metadata:
      labels:
        app: frontend
        version: green
    spec:
      containers:
        - name: frontend
          image: 864899875710.dkr.ecr.us-east-1.amazonaws.com/frontend-green:2.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080