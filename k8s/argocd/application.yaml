apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/justinidahosa/app-configuration
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true