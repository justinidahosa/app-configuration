apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: backend-db-secrets
  namespace: backend
spec:
  provider: aws

  parameters:
    region: us-east-1
    objects: |
      - objectName: "db-credentials"
        objectType: "secretsmanager"

  secretObjects:
    - secretName: backend-db-secret
      type: Opaque
      data:
        - objectName: host
          key: DB_HOST
        - objectName: username
          key: DB_USER
        - objectName: password
          key: DB_PASSWORD
        - objectName: dbname
          key: DB_NAME
        - objectName: port
          key: DB_PORT