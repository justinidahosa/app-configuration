apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: backend-db-secrets
  namespace: backend
spec:
  provider: aws
  secretObjects:
    - secretName: backend-db-secret
      type: Opaque
      data:
        - objectName: host_alias
          key: DB_HOST
        - objectName: user_alias
          key: DB_USER
        - objectName: pass_alias
          key: DB_PASSWORD
        - objectName: name_alias
          key: DB_NAME
        - objectName: port_alias
          key: DB_PORT
  parameters:
    region: us-east-1 
    objects: |
      - objectName: "db-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: host
            objectAlias: host_alias
          - path: username
            objectAlias: user_alias
          - path: password
            objectAlias: pass_alias
          - path: dbname
            objectAlias: name_alias
          - path: port
            objectAlias: port_alias