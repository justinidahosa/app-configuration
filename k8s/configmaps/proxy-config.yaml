apiVersion: v1
kind: ConfigMap
metadata:
  name: api-proxy-config
  namespace: backend
data:
  default.conf: |
    server {
      listen 80;

      location /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://backend-service:80;
      }

      location = /api {
        rewrite ^ / break;
        proxy_pass http://backend-service:80;
      }
    }