apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: backend
  annotations:
    alb.ingress.kubernetes.io/group.name: "devsecops-stack"
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/actions.weighted-routing: >
      {
        "type": "forward",
        "forwardConfig": {
          "targetGroups": [
            { "serviceName": "backend-v1-service", "servicePort": 8080, "weight": 100 },
            { "serviceName": "backend-v2-service", "servicePort": 8080, "weight": 0 }
          ]
        }
      }
spec:
  ingressClassName: alb
  rules:
  - host: app.justinidahosa.click
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: weighted-routing
            port:
              name: use-annotation