apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: backend
  annotations:
    alb.ingress.kubernetes.io/group.name: "devsecops-stack"
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/actions.weighted-routing: >
      {
        "Type": "forward",
        "ForwardConfig": {
          "TargetGroups": [
            {
              "ServiceName": "backend-v1-service",
              "Port": "80",
              "Weight": 100
            },
            {
              "ServiceName": "backend-v2-service",
              "Port": "80",
              "Weight": 0
            }
          ]
        }
      }
spec:
  ingressClassName: alb
  rules:
  - host: app.justinidahosa.click
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: weighted-routing
            port:
              name: use-annotation