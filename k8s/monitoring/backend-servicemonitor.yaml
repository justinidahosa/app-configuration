apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-servicemonitor
  namespace: monitoring
  labels:
    release: prometheus-stack
    app.kubernetes.io/instance: prometheus-stack
spec:
  namespaceSelector:
    any: true 
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: "http-backend"
      path: /metrics
      interval: 10s