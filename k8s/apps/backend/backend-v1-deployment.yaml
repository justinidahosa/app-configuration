apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v1
  namespace: backend
  annotations: 
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      version: v1
  template:
    metadata:
      labels:
        app: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: 284432073095.dkr.ecr.us-east-1.amazonaws.com/backend-v1:97cc67cc83ddcb0696e0f70484bac5b7c38ba42a
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true

          env:
            # App config
            - name: DEPLOYMENT
              valueFrom:
                configMapKeyRef:
                  name: backend-v1-config
                  key: DEPLOYMENT

            - name: VERSION
              valueFrom:
                configMapKeyRef:
                  name: backend-v1-config
                  key: VERSION

            # DB credentials (all from Secrets Manager)
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-db-secret
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-db-secret
                  key: DB_PORT

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-db-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-db-secret
                  key: DB_PASSWORD

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-db-secret
                  key: DB_NAME

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: backend-db-secrets