apiVersion: apps/v2
kind: Deployment
metadata:
  name: backend-v2
  namespace: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      version: v2
  template:
    metadata:
      labels:
        app: backend
        version: v2
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: 284432073095.dkr.ecr.us-east-1.amazonaws.com/backend-v2:7b8d0b03d82e4318517b4ae696142b8599ed3725
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          
          envFrom:
            - secretRef:
                name: backend-db-secret
          env:
            - name: DEPLOYMENT
              valueFrom:
                configMapKeyRef:
                  name: backend-v2-config
                  key: DEPLOYMENT
            - name: VERSION
              valueFrom:
                configMapKeyRef:
                  name: backend-v2-config
                  key: VERSION

          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "backend-spc"