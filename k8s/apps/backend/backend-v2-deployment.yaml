apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v2
  namespace: backend
  annotations:
    argocd.argoproj.io/sync-wave: "2"

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend
      version: v2

  template:
    metadata:
      labels:
        app: backend
        version: v2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"

    spec:
      serviceAccountName: backend-sa

      containers:
        - name: backend
          image: 284432073095.dkr.ecr.us-east-1.amazonaws.com/backend-v2:7b8d0b03d82e4318517b4ae696142b8599ed3725
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-db-secret
                  key: DB_HOST

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-db-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-db-secret
                  key: DB_PASSWORD

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-db-secret
                  key: DB_NAME

            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-db-secret
                  key: DB_PORT

            - name: DEPLOYMENT
              valueFrom:
                configMapKeyRef:
                  name: backend-v2-config
                  key: DEPLOYMENT

            - name: VERSION
              valueFrom:
                configMapKeyRef:
                  name: backend-v2-config
                  key: VERSION

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3