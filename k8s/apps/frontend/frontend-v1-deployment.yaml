apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-v1
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      version: v1
  template:
    metadata:
      labels:
        app: frontend
        version: v1
    spec:
      containers:
      - name: frontend
        image: 284432073095.dkr.ecr.us-east-1.amazonaws.com/frontend-v1:7b8d0b03d82e4318517b4ae696142b8599ed3725
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
