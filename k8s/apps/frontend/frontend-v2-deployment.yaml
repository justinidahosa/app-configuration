apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-v2
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      version: v2
  template:
    metadata:
      labels:
        app: frontend
        version: v2
    spec:
      containers:
        - name: frontend
          image: 284432073095.dkr.ecr.us-east-1.amazonaws.com/frontend-v2:97cc67cc83ddcb0696e0f70484bac5b7c38ba42a
          imagePullPolicy: Always
          ports:
            - containerPort: 8080